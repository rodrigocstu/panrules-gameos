name: Lighthouse CI

# Gate de rendimiento/accesibilidad/best-practices (≥ 90) — WBS 6.2.
# Corre en pull requests y bajo demanda, SEPARADO del deploy a main, para no
# bloquear la publicación a Pages si el runner de Lighthouse es flaky.
# Las aserciones viven en lighthouserc.json.

on:
  pull_request:
  workflow_dispatch:

jobs:
  lighthouse:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Lighthouse CI
        run: npx --yes @lhci/cli@0.13.x autorun
