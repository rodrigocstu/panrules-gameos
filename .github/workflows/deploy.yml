name: Build and Deploy to GitHub Pages

# Construye la app Vite y la publica en GitHub Pages en cada push a main.
# Reemplaza el deploy manual `npm run deploy` (gh-pages).
# Pages se habilita solo desde el workflow (configure-pages enablement: true);
# no requiere tocar Settings -> Pages manualmente.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          # node 24 = npm 11, igual que el entorno donde se generó package-lock.json.
          # (node 20/22 traen npm 10 y rompen `npm ci` por resolución de peer-deps.)
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint --if-present

      - name: Build
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          # Habilita GitHub Pages (build_type: workflow) si aún no lo está,
          # evitando el paso manual en Settings -> Pages.
          enablement: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'dist'

  deploy:
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
